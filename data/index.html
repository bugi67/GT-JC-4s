<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GT-JC-4s</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="shell">

<!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="brand">
    <div class="brand-main">GT</div>
    <div class="brand-sub">JC-4s</div>
  </div>

  <nav class="sidenav">
    <button class="snav-btn active" data-page="dashboard">
      <svg class="snav-icon" viewBox="0 0 24 24" fill="currentColor">
        <rect x="3" y="3" width="8" height="8" rx="1.5"/>
        <rect x="13" y="3" width="8" height="8" rx="1.5"/>
        <rect x="3" y="13" width="8" height="8" rx="1.5"/>
        <rect x="13" y="13" width="8" height="8" rx="1.5"/>
      </svg>
      <span data-i18n="nav_dashboard">Dashboard</span>
    </button>

    <button class="snav-btn" data-page="presets">
      <svg class="snav-icon" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="5" cy="6"  r="1.6"/><rect x="9" y="5"  width="12" height="2" rx="1"/>
        <circle cx="5" cy="12" r="1.6"/><rect x="9" y="11" width="12" height="2" rx="1"/>
        <circle cx="5" cy="18" r="1.6"/><rect x="9" y="17" width="8"  height="2" rx="1"/>
      </svg>
      <span data-i18n="nav_presets">Presets</span>
    </button>

    <button class="snav-btn" data-page="settings">
      <svg class="snav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm8.94 3A9 9 0 0 0 13 3.06V2h-2v1.06A9 9 0 0 0 3.06 11H2v2h1.06A9 9 0 0 0 11 20.94V22h2v-1.06A9 9 0 0 0 20.94 13H22v-2h-1.06zM12 19a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"/>
      </svg>
      <span data-i18n="nav_settings">Settings</span>
    </button>

    <button class="snav-btn" data-page="maint">
      <svg class="snav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/>
      </svg>
      <span data-i18n="nav_maint">Maintenance</span>
    </button>
  </nav>

  <div class="sidebar-foot">
    <button class="sfoot-btn" id="btn-theme">🌙</button>
    <button class="sfoot-btn" id="btn-lang">DE</button>
  </div>
</aside>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<main class="main">

  <!-- Dashboard -->
  <div class="page active" id="page-dashboard">
    <div class="page-hdr">
      <h1 class="page-title" data-i18n="nav_dashboard">Dashboard</h1>
    </div>

    <div class="card">
      <div class="card-lbl" data-i18n="title_tuner">Tuner Controls</div>
      <div class="slider-row">
        <span class="sl-lbl">L</span>
        <input type="range"  id="slider-L" min="0" max="2047" value="0">
        <input type="number" id="num-L"    min="0" max="2047" value="0" class="num-in">
      </div>
      <div class="slider-row">
        <span class="sl-lbl">C</span>
        <input type="range"  id="slider-C" min="0" max="511"  value="0">
        <input type="number" id="num-C"    min="0" max="511"  value="0" class="num-in">
      </div>
      <div class="mode-row">
        <span class="sl-lbl" data-i18n="lbl_mode">Mode</span>
        <div class="seg">
          <button class="seg-btn active" data-mode="1">C @ TRX</button>
          <button class="seg-btn"        data-mode="2">C @ ANT</button>
          <button class="seg-btn"        data-mode="3" data-i18n="mode_noc">No C</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-lbl">AutoTune</div>
      <div class="row-gap">
        <button class="btn btn-primary" id="btn-autotune" data-i18n="btn_autotune">Start AutoTune</button>
        <button class="btn btn-ghost"   id="btn-abort"    data-i18n="btn_abort" disabled>Abort</button>
      </div>
      <div class="prog-wrap" id="tune-prog-wrap" style="display:none">
        <div class="prog-bar" id="tune-prog-bar"></div>
      </div>
      <div class="status-line" id="tune-status"></div>
    </div>
  </div>

  <!-- Presets -->
  <div class="page" id="page-presets">
    <div class="page-hdr">
      <h1 class="page-title" data-i18n="nav_presets">Presets</h1>
    </div>
    <div class="card">
      <div class="card-lbl" data-i18n="title_presets">Saved Presets</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="th_freq">Frequency</th>
              <th>L</th><th>C</th>
              <th data-i18n="th_mode">Mode</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="presets-tbody">
            <tr><td colspan="5" class="empty-cell" data-i18n="lbl_loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="card-foot">
        <button class="btn btn-danger" id="btn-delete-all" data-i18n="btn_delete_all">Delete all</button>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div class="page" id="page-settings">
    <div class="page-hdr">
      <h1 class="page-title" data-i18n="nav_settings">Settings</h1>
    </div>
    <div class="card">
      <div class="card-lbl">Wi-Fi</div>
      <div class="form-group">
        <label data-i18n="lbl_ssid">SSID</label>
        <input type="text"     id="cfg-wifi-ssid" autocomplete="off">
      </div>
      <div class="form-group">
        <label data-i18n="lbl_pass">Password</label>
        <input type="password" id="cfg-wifi-pass" autocomplete="new-password">
      </div>
    </div>
    <div class="card">
      <div class="card-lbl">MQTT</div>
      <div class="form-2col">
        <div class="form-group">
          <label data-i18n="lbl_mqtt_srv">Server</label>
          <input type="text"   id="cfg-mqtt-server">
        </div>
        <div class="form-group">
          <label data-i18n="lbl_mqtt_port">Port</label>
          <input type="number" id="cfg-mqtt-port" min="1" max="65535">
        </div>
      </div>
      <div class="toggle-row">
        <span data-i18n="lbl_mqtt_en">Enabled</span>
        <label class="toggle">
          <input type="checkbox" id="cfg-mqtt-en">
          <span class="tog-track"></span>
        </label>
      </div>
    </div>
    <div class="card">
      <div class="card-lbl">AutoTuner</div>
      <div class="form-2col">
        <div class="form-group">
          <label data-i18n="lbl_threshold">Return Loss threshold [dB]</label>
          <input type="number" id="cfg-tune-thr" step="0.5" min="6" max="30">
        </div>
        <div class="form-group">
          <label data-i18n="lbl_tx_level">Min Vfwd (TX detect)</label>
          <input type="number" id="cfg-tune-tx"  min="1" max="255">
        </div>
        <div class="form-group">
          <label data-i18n="lbl_coarse_l">Coarse step L</label>
          <input type="number" id="cfg-coarse-l" min="1" max="256">
        </div>
        <div class="form-group">
          <label data-i18n="lbl_coarse_c">Coarse step C</label>
          <input type="number" id="cfg-coarse-c" min="1" max="128">
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-lbl">OTA / Logging</div>
      <div class="form-group">
        <label data-i18n="lbl_ota_url">Manifest URL</label>
        <input type="text" id="cfg-ota-url">
      </div>
      <div class="form-group">
        <label data-i18n="lbl_log_level">Log level</label>
        <select id="cfg-log-level">
          <option value="0">ERROR</option>
          <option value="1">WARN</option>
          <option value="2">INFO</option>
          <option value="3">DEBUG</option>
        </select>
      </div>
    </div>
    <div class="row-gap" style="margin-top:4px">
      <button class="btn btn-primary" id="btn-save-cfg" data-i18n="btn_save">Save</button>
      <div class="status-line" id="cfg-status"></div>
    </div>
  </div>

  <!-- Maintenance -->
  <div class="page" id="page-maint">
    <div class="page-hdr">
      <h1 class="page-title" data-i18n="nav_maint">Maintenance</h1>
    </div>
    <div class="card">
      <div class="card-lbl" data-i18n="title_github_ota">GitHub OTA</div>
      <div class="ota-box" id="ota-info">–</div>
      <div class="prog-wrap" style="margin:10px 0">
        <div class="prog-bar" id="ota-prog-bar"></div>
      </div>
      <div class="status-line" id="ota-state-lbl"></div>
      <div class="row-gap" style="margin-top:14px">
        <button class="btn btn-ghost"   id="btn-ota-check"   data-i18n="btn_check">Check for update</button>
        <button class="btn btn-primary" id="btn-ota-install" data-i18n="btn_install" disabled>Install</button>
      </div>
    </div>
    <div class="card">
      <div class="card-lbl" data-i18n="title_local_ota">Local Upload</div>
      <div class="upload-row">
        <div class="form-group">
          <label data-i18n="lbl_fw_file">Firmware (firmware.bin)</label>
          <input type="file" id="fw-file" accept=".bin">
        </div>
        <button class="btn btn-ghost" id="btn-local-fw" data-i18n="btn_upload_fw">Upload FW</button>
      </div>
      <div class="upload-row" style="margin-top:14px">
        <div class="form-group">
          <label data-i18n="lbl_fs_file">Filesystem (littlefs.bin)</label>
          <input type="file" id="fs-file" accept=".bin">
        </div>
        <button class="btn btn-ghost" id="btn-local-fs" data-i18n="btn_upload_fs">Upload FS</button>
      </div>
      <div class="status-line" id="local-status"></div>
    </div>
    <div class="card">
      <div class="card-lbl" data-i18n="title_system">System</div>
      <button class="btn btn-danger" id="btn-reboot" data-i18n="btn_reboot">Reboot</button>
      <div class="status-line" id="maint-status"></div>
    </div>
  </div>

</main>

<!-- ── Stats panel ──────────────────────────────────────────────────────── -->
<aside class="statspanel">
  <div class="sp-hdr" data-i18n="sp_header">Tuner Stats</div>

  <div class="sp-hero">
    <div class="sp-hero-num" id="sp-swr">—</div>
    <div class="sp-hero-lbl" data-i18n="lbl_swr">SWR</div>
  </div>

  <div class="sp-grid">
    <div class="sp-cell">
      <div class="sp-cell-num" id="sp-rl">—</div>
      <div class="sp-cell-lbl">RL (dB)</div>
    </div>
    <div class="sp-cell">
      <div class="sp-cell-num" id="sp-freq">—</div>
      <div class="sp-cell-lbl" data-i18n="lbl_freq_kHz">Freq (kHz)</div>
    </div>
    <div class="sp-cell">
      <div class="sp-cell-num" id="sp-l">—</div>
      <div class="sp-cell-lbl">L</div>
    </div>
    <div class="sp-cell">
      <div class="sp-cell-num" id="sp-c">—</div>
      <div class="sp-cell-lbl">C</div>
    </div>
  </div>

  <hr class="sp-hr">

  <div class="sp-section-lbl" data-i18n="sp_tune_status">Tune Status</div>
  <div class="sp-status-row">
    <span class="sp-dot" id="sp-tune-dot"></span>
    <span id="sp-tune-lbl" data-i18n="tune_idle">Idle</span>
  </div>
  <div class="prog-wrap" id="sp-tune-wrap" style="display:none">
    <div class="prog-bar" id="sp-tune-bar"></div>
  </div>

  <hr class="sp-hr">

  <div class="sp-section-lbl">OTA</div>
  <div class="sp-status-row">
    <span class="sp-dot" id="sp-ota-dot"></span>
    <span id="sp-ota-lbl">Idle</span>
  </div>
  <div class="prog-wrap" id="sp-ota-wrap" style="display:none">
    <div class="prog-bar" id="sp-ota-bar"></div>
  </div>

  <div class="sp-meta">
    <div class="sp-meta-row">
      <span class="sp-meta-lbl" data-i18n="lbl_fw">Firmware</span>
      <span id="sp-fw">—</span>
    </div>
    <div class="sp-meta-row">
      <span class="sp-meta-lbl">RSSI</span>
      <span id="sp-rssi">—</span>
    </div>
  </div>
</aside>

</div><!-- .shell -->
<script src="/app.js"></script>
</body>
</html>
